name: CI

on:
  push:
    branches: [master, v3.0.0]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: ruff check plecost/
      - run: mypy plecost/ --ignore-missing-imports
      - run: pytest tests/unit tests/integration tests/contract tests/property -v --cov=plecost --cov-report=term-missing --cov-fail-under=75
